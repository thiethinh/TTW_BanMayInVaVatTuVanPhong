services:
  db:
    image: mysql:8.0
    container_name: mysql-papercraft
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "1"
      MYSQL_DATABASE: "papercraft_db"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

  webapp:
    build: .
    container_name: papercraft-web
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306

volumes:
  mysql-data: